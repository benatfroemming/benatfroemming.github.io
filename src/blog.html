<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/blog_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Blog</title>
</head>
<body>
    <header>
        <div class="banner">
            <img src="/img/pattern.jpg" alt="Banner Image">
        </div>
    </header>
    <div class="back-button">
        <a href="/index" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    <div class="content">
        <div class="title">Blog</div>
    <section class="blog-section">
        <article class="blog-preview" data-link="/blogs/blog1">
            <img src="/img/ravello2.jpg" alt="Blog Image">
            <div class="blog-info">
                <span class="blog-date">August 17, 2023</span>
                <h2 class="blog-title">Volunteering Trip in Italy</h2>
            </div>
        </article>
        <article class="blog-preview" data-link="/blogs/blog2">
            <img src="/img/youth.png" alt="Blog Image">
            <div class="blog-info">
                <span class="blog-date">August 8, 2022</span>
                <h2 class="blog-title">Youth Skyrunning Championship</h2>
            </div>
        </article>
    </div>
        <!-- Add more blog previews here -->
    </section>
    <script>
        const previews = document.querySelectorAll(".blog-preview");
        
        // Loop through each preview and add a click event listener
        previews.forEach(preview => {
            preview.addEventListener("click", () => {
                const link = preview.getAttribute("data-link");
                if (link) {
                    window.location.href = link;
                }
            });
        });
        
        
    </script>
    
</body>
</html>
