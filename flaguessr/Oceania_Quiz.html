<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>World Flag Quiz</title>
    <link rel="stylesheet" href="Quiz.css">
    <script src="https://kit.fontawesome.com/d8dc0d9035.js" crossorigin="anonymous"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5247756664987300"
     crossorigin="anonymous"></script>
</head>
<body>
    <button class="start" type="button">Restart</button>
    <button class="home" type="button">Exit Quiz</button>
    <div class="card">
        <div class="content">
            <img scr="" height="120" class="image">
            <h1></h1>
            <a></a>
        </div>
    </div>
    <div class="wrapper">
        <div class="search-input">
            <input type="text" placeholder="Search country...">
            <div id='parent' class="autocom-box">
                <li>Australia</li>
                <li>Fiji</li>
                <li>Indonesia</li>
                <li>Kiribati</li>
                <li>Marshall Islands</li>
                <li>Micronesia</li>
                <li>Nauru</li>
                <li>New Zealand</li>
                <li>Palau</li>
                <li>Papua New Guinea</li>
                <li>Samoa</li>
                <li>Solomon Islands</li>
                <li>Tonga</li>
                <li>Tuvalu</li>
                <li>Vanuatu</li>
            </div>
            <div class="icon"><i class="fa fa-arrow-right"></i></div>
        </div>
    </div>
    <a class="alert">No results found.</a>
    <script src="Oceania_Quiz.js"></script>
    <script src="confetti.js"></script>
</body>
</html>
