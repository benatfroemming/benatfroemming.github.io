<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>World Flag Quiz</title>
    <link rel="stylesheet" href="Flashcards.css">
    <script src="https://kit.fontawesome.com/d8dc0d9035.js" crossorigin="anonymous"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5247756664987300"
     crossorigin="anonymous"></script>
</head>
<body>
    <button class="home" type="button">Exit</button>
    <button class="start" type="button">Restart</button>
    <div class="arrow1">
        <i class="fa-sharp fa-solid fa-caret-left"></i>
    </div>
    <div class="arrow2">
        <i class="fa-sharp fa-solid fa-caret-right"></i>
    </div>
    <div class="card">
        <div class="card_inner">
            <div class="face face--front">
                <img scr="" height="120" class="image">
            </div>
            <div class="face face--back">
                <div class="content">
                    <h1></h1>
                    <div class="info">
                        <p>- Capital city: <a class="capital"></a></p>
                        <p>- Population: <a class="population"></a></p>
                        <p>- Total area (km<sup>2</sup>): <a class="area"></a></p>
                        <p>- Official languages: <a class="language"></a></p>
                        <a href="" class="maps" target="_blank">Google Maps 📍</a>
                        <a href="" class="wiki" target="_blank">Wikipedia 📚</a>
                        <img scr="" height="60" width="80" class="image2">
                    </div>
                    <link>
                    <link>
                </div>
            </div>
        </div>
    </div>
    <script src="Africa_Flashcards.js"></script>
</body>
</html>
